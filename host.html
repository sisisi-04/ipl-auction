<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>IPL Royal Auction</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(to bottom, #2b0000, #000000);
  color: gold;
}

.header {
  text-align: center;
  font-size: 28px;
  padding: 20px;
  background: linear-gradient(90deg, gold, #b8860b);
  color: black;
  font-weight: bold;
}

.container {
  display: flex;
  gap: 20px;
  padding: 20px;
}

.panel {
  flex: 1;
  background: rgba(0,0,0,0.7);
  border: 2px solid gold;
  border-radius: 12px;
  padding: 15px;
}

input {
  width: 90%;
  padding: 10px;
  margin: 8px 0;
  border: none;
  border-radius: 6px;
}

button {
  background: gold;
  border: none;
  padding: 10px;
  font-weight: bold;
  cursor: pointer;
  width: 100%;
}

.player-card {
  background: #1a0000;
  border: 1px solid gold;
  margin: 10px 0;
  padding: 10px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.player-card img {
  width: 60px;
  height: 60px;
  border-radius: 50%;
  border: 2px solid gold;
}

.actions button {
  margin: 5px;
  width: auto;
}
</style>
</head>

<body>

<div class="header">
👑 IPL ROYAL AUCTION CONTROL ROOM
</div>

<div class="container">

  <!-- ADD PLAYER -->
  <div class="panel">
    <h2>Add Player</h2>

    <input id="name" placeholder="Player Name" />
    <input id="price" type="number" placeholder="Starting Price (Lakhs)" />
    <input id="img" placeholder="Image URL" />

    <button onclick="addPlayer()">➕ Add Player</button>
  </div>

  <!-- PLAYER LIST -->
  <div class="panel">
    <h2>Live Auction Players</h2>
    <div id="playerList"></div>
  </div>

</div>

<script>
let players = [];
let teamA = [];
let teamB = [];

function addPlayer() {
  const name = document.getElementById("name").value;
  const price = document.getElementById("price").value;
  const img = document.getElementById("img").value;

  if (!name || !price) return;

  const player = {
    id: Date.now(),
    name,
    price,
    img,
    status: "unsold"
  };

  players.push(player);
  renderPlayers();
}

function renderPlayers() {
  const list = document.getElementById("playerList");
  list.innerHTML = "";

  players.forEach(p => {
    if (p.status === "sold") return;

    list.innerHTML += `
      <div class="player-card">
        <img src="${p.img || 'https://via.placeholder.com/60'}" />
        <div>
          <h3>${p.name}</h3>
          <p>💰 ${p.price} Lakhs</p>

          <div class="actions">
            <button onclick="sellPlayer(${p.id}, 'A')">Sell to A</button>
            <button onclick="sellPlayer(${p.id}, 'B')">Sell to B</button>
          </div>
        </div>
      </div>
    `;
  });
}

function sellPlayer(id, team) {
  let player = players.find(p => p.id === id);
  player.status = "sold";

  if (team === "A") teamA.push(player);
  if (team === "B") teamB.push(player);

  renderPlayers();

  console.log("TEAM A:", teamA);
  console.log("TEAM B:", teamB);
}
</script>

</body>
</html>
