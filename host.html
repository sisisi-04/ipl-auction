<!DOCTYPE html>
<html>
<head>
  <title>Grand IPL Auction Host</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="header">
  👑 THE GRAND IPL AUCTION
  <span class="live">● LIVE</span>
</div>

<div class="add-panel">
  <h2>Add Player</h2>

  <input id="name" placeholder="Player Name">

 <select id="category">
  <option>Marquee</option>
  <option>Batter</option>
  <option>All Rounder</option>
  <option>Wicket Keeper</option>
  <option>Bowler</option>
  <option>Emerging Player</option>
</select>

  <input id="price" type="number"
         placeholder="Base Price (Lakhs)">

  <input id="img"
         placeholder="Image URL">

  <button onclick="addPlayer()">
    ADD PLAYER
  </button>
</div>

<div class="broadcast">

  <!-- Team A -->
  <div class="team">
    <h2>TEAM A</h2>

    <div class="money">
      ₹100 Cr
    </div>

    <div class="count">
      0 / 15 Players
    </div>
  </div>

  <!-- Current Player -->
  <div id="players"></div>

  <!-- Team B -->
  <div class="team">
    <h2>TEAM B</h2>

    <div class="money">
      ₹100 Cr
    </div>

    <div class="count">
      0 / 15 Players
    </div>
  </div>

</div>

<div class="queue">
</div>

<script type="module" src="host.js"></script>

</body>
</html>
